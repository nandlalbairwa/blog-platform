<!DOCTYPE html>
<html>
<head>
  <title>Blog Detail</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo"> Blogs</div>
  <nav>
    <a href="home.html">Home</a>
    <a href="profile.html">Profile</a>
    <a href="#" onclick="logout()" class="btn-small">Logout</a>
  </nav>
</header>

<div class="detail-container" id="blogDetail"></div>

<script>
const API = "http://localhost:5000/api/blogs";
const token = localStorage.getItem("token");

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadBlog(){
  const res = await fetch(API);
  const blogs = await res.json();
  const blog = blogs.find(b => b._id === id);

  const div = document.getElementById("blogDetail");

  div.innerHTML = `
    <div class="detail-card">
      ${blog.image ? `<img src="http://localhost:5000/uploads/${blog.image}" class="detail-img">` : ""}
      <h1>${blog.title}</h1>
      <p class="author">By ${blog.author?.name || "Unknown"}</p>
      <p class="full-content">${blog.content}</p>

      <button onclick="likeBlog('${blog._id}')">
        ❤️ ${blog.likes.length}
      </button>

      <div class="comment-section">
        <h3>Comments (${blog.comments.length})</h3>

        ${blog.comments.map(c => `
          <div class="comment">
            <strong>${c.user?.name || "User"}:</strong>
            ${c.text}
          </div>
        `).join("")}

        <input type="text" id="commentInput" placeholder="Write a comment...">
        <button onclick="addComment()">Post</button>
      </div>
    </div>
  `;
}

async function likeBlog(blogId){
  await fetch(API + "/" + blogId + "/like", {
    method:"PUT",
    headers:{ "Authorization": token }
  });
  loadBlog();
}

async function addComment(){
  const text = document.getElementById("commentInput").value;

  await fetch(API + "/" + id + "/comment", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ text })
  });

  loadBlog();
}

function logout(){
  localStorage.removeItem("token");
  window.location = "index.html";
}

loadBlog();
</script>

</body>
</html>
