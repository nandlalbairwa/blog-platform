<!DOCTYPE html>
<html>
<head>
  <title> Blogs</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
  <div class="logo"> Blogs</div>

  <input type="text" id="searchInput" placeholder="Search blogs..." class="search-bar" onkeyup="searchBlogs()">

  <nav>
    <a href="home.html">Home</a>
    <a href="write.html">Write</a>
    <a href="#contact">Contact</a>
    <span id="profileName" style="margin-left:15px; font-weight:600;"></span>
    <a href="#" onclick="logout()" class="btn-small">Logout</a>
    <a href="#" onclick="toggleDark()">🌙</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Share Your Ideas With The World</h1>
    <p>Write. Publish. Inspire.</p>
    <a href="write.html" class="cta-btn">Start Writing</a>
  </div>
</section>

<section class="blogs-section">
  <h2 class="section-title">Latest Blogs</h2>
  <div id="blogContainer"></div>
  <div class="blog-grid" id="blogs"></div>
</section>

<footer class="footer" id="contact">
  <h3>Nandu Blogs</h3>
  <p>Connect with us</p>
  <div class="footer-links">
    <a href="tel:+919999999999">📞 Call</a>
    <a href="mailto:yourmail@gmail.com">📧 Email</a>
    <a href="https://linkedin.com" target="_blank">LinkedIn</a>
    <a href="https://x.com" target="_blank">X</a>
  </div>
</footer>

<script>
async function loadBlogs() {
  try {
    const res = await fetch("http://localhost:5000/api/blogs");
    const blogs = await res.json();

    const container = document.getElementById("blogContainer");
    container.innerHTML = "";

    blogs.forEach(blog => {
      const div = document.createElement("div");
      div.className = "blog-card";
      div.innerHTML = `
        <h2>${blog.title}</h2>
        <p>${blog.content}</p>
        <small>${new Date(blog.createdAt).toLocaleString()}</small>
        <hr/>
      `;
      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
  }
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

loadBlogs();
</script>
</body>
</html>
