<!DOCTYPE html>
<html>
<head>
  <title>DevDiary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particles"></canvas>
<div class="cursor-glow"></div>

<div class="navbar" id="navbar">
  <div><strong>DevDiary</strong></div>
  <div>
    <a href="home.html">Home</a>
    <a href="write.html">Write</a>
    <a href="blog.html">Blog</a>
     <a href="register.html">Register</a>
    <a href="index.html">login</a>
    <a href="profile.html">Profile</a>
   
  </div>
</div>

<div class="hero">
  <h1>Share Your Ideas With The World</h1>
  <p>Write,Publish,Inspire</p>
</div>

<div class="container">
  <h2>Latest Blogs</h2>
  <div id="blogContainer"></div>
</div>

<script>

/* ===== Cursor Glow ===== */
const glow = document.querySelector(".cursor-glow");
document.addEventListener("mousemove", e => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

/* ===== Navbar Shrink ===== */
window.addEventListener("scroll", () => {
  const navbar = document.getElementById("navbar");
  navbar.classList.toggle("scrolled", window.scrollY > 50);
});

/* ===== Simple Particle Background ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<100;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    ctx.fill();
  });
  updateParticles();
}

function updateParticles(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });
}

setInterval(drawParticles, 30);

/* ===== Load Blogs ===== */
async function loadBlogs(){
  const res = await fetch("/api/blogs");
  const blogs = await res.json();

  const container = document.getElementById("blogContainer");
  container.innerHTML = "";

  blogs.reverse().forEach(blog=>{
    container.innerHTML += `
      <div class="card">
        <h3>${blog.title}</h3>
        <p>${blog.content}</p>
        ${blog.image ? `<img src="/uploads/${blog.image}">` : ""}
        <div class="actions">
          <button class="edit-btn" onclick="editBlog('${blog._id}')">✏ Edit</button>
          <button class="delete-btn" onclick="deleteBlog('${blog._id}')">🗑 Delete</button>
          <button class="like-btn" onclick="likeBlog('${blog._id}')">
  ❤️ ${blog.likes ? blog.likes.length : 0}
</button>
        </div>
      </div>
    `;
  });
}

function editBlog(id){
  window.location.href = "write.html?id=" + id;
}

async function deleteBlog(id){
  await fetch(`/api/blogs/${id}`, { method:"DELETE" });
  loadBlogs();
}

async function likeBlog(id){
  await fetch(`/api/blogs/${id}/like`, { method:"PUT" });
  loadBlogs();
}

loadBlogs();

</script>

</body>
</html>
